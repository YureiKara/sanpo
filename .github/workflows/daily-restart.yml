name: Daily Restart
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 152.42.163.65
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: pm2 restart openclaw && pm2 save
