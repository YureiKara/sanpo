name: Fetch Private Markets

on:
  workflow_dispatch:  # manual trigger — called by Yurei via GitHub API

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pytz

      - name: Fetch private company data
        run: python fetch_private.py

      - name: Commit private.json
        run: |
          git config user.email "sanpo-bot@yurei"
          git config user.name "SANPO Bot"
          git add private.json
          git diff --staged --quiet || git commit -m "data: update private.json $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
